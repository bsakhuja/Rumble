name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          devices = [d for devs in data['devices'].values() for d in devs
                     if d['isAvailable'] and 'iPhone' in d['name']]
          print(devices[-1]['udid'])
          ")
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Build
        run: |
          xcodebuild build \
            -project Rumble.xcodeproj \
            -scheme Rumble \
            -destination "id=$SIM_UDID" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project Rumble.xcodeproj \
            -scheme Rumble \
            -destination "id=$SIM_UDID" \
            -only-testing:RumbleTests \
            CODE_SIGNING_ALLOWED=NO
